<!DOCTYPE html>
    <html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <main id="sceneArea">
        <section id="scene" data-dice-num="1" data-number-style="dots">
            <div class="diePad">
                <div class="die" data-result="6">
                    <div class="face face-1">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="2" cy="2"></circle></svg>
                    </div>
                    <div class="face face-2">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="3" cy="1"></circle><circle r="0.4" cx="1" cy="3"></circle></svg>
                    </div>
                    <div class="face face-3">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="3" cy="1"></circle><circle r="0.4" cx="2" cy="2"></circle><circle r="0.4" cx="1" cy="3"></circle></svg>
                    </div>
                    <div class="face face-4">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="1" cy="1"></circle><circle r="0.4" cx="3" cy="1"></circle><circle r="0.4" cx="1" cy="3"></circle><circle r="0.4" cx="3" cy="3"></circle></svg>
                    </div>
                    <div class="face face-5">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="1" cy="1"></circle><circle r="0.4" cx="3" cy="1"></circle><circle r="0.4" cx="2" cy="2"></circle><circle r="0.4" cx="1" cy="3"></circle><circle r="0.4" cx="3" cy="3"></circle></svg>
                    </div>
                    <div class="face face-6">
                        <svg viewBox="0 0 4 4"><circle r="0.4" cx="1" cy="1"></circle><circle r="0.4" cx="3" cy="1"></circle><circle r="0.4" cx="1" cy="2"></circle><circle r="0.4" cx="3" cy="2"></circle><circle r="0.4" cx="1" cy="3"></circle><circle r="0.4" cx="3" cy="3"></circle></svg>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
